services:
  db:
    image: mariadb:10.11
    container_name: nextcloud_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: nextcloud
      MYSQL_USER: nextcloud
      MYSQL_PASSWORD: nextcloud
    volumes:
      - db_data:/var/lib/mysql

  # One-shot init container: copies the app into the shared named volume
  # and sets ownership to www-data (uid 33) so Nextcloud can use it.
  # Runs before nextcloud starts; restart:no means it won't loop.
  fix-perms:
    image: alpine:3
    container_name: nextcloud_fix_perms
    restart: "no"
    volumes:
      - ./talk_browser:/src/talk_browser:ro
      - apps_dev:/apps-dev
    command: >
      sh -c "
        cp -r /src/talk_browser /apps-dev/talk_browser &&
        chown -R 33:33 /apps-dev
      "

  nextcloud:
    image: nextcloud:31
    container_name: nextcloud_app
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      NEXTCLOUD_ADMIN_USER: admin
      NEXTCLOUD_ADMIN_PASSWORD: admin
      NEXTCLOUD_TRUSTED_DOMAINS: localhost
      MYSQL_HOST: db
      MYSQL_DATABASE: nextcloud
      MYSQL_USER: nextcloud
      MYSQL_PASSWORD: nextcloud
    volumes:
      - nextcloud_data:/var/www/html
      # Entrypoint hooks handle first-boot config and apps_paths setup
      - ./docker/hooks:/docker-entrypoint-hooks.d
      # Apache alias so /apps-dev static assets are served (bind-mounted as root-owned file, always present)
      - ./docker/apache/apps-dev.conf:/etc/apache2/conf-enabled/apps-dev.conf:ro
      # App served from named volume (writable by www-data, set by fix-perms)
      - apps_dev:/apps-dev
    depends_on:
      - db
      - fix-perms

volumes:
  nextcloud_data:
  db_data:
  apps_dev:

version: '3.8'

services:
  db:
    image: mariadb:10.11
    container_name: nextcloud_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: nextcloud
      MYSQL_USER: nextcloud
      MYSQL_PASSWORD: nextcloud
    volumes:
      - db_data:/var/lib/mysql

  nextcloud:
    image: nextcloud:31
    container_name: nextcloud_app
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      NEXTCLOUD_ADMIN_USER: admin
      NEXTCLOUD_ADMIN_PASSWORD: admin
      NEXTCLOUD_TRUSTED_DOMAINS: localhost
      MYSQL_HOST: db
      MYSQL_DATABASE: nextcloud
      MYSQL_USER: nextcloud
      MYSQL_PASSWORD: nextcloud
    volumes:
      - nextcloud_data:/var/www/html
      # Mount custom config (debug mode + apps-extra path)
      - ./docker/config.php:/var/www/html/config/custom.config.php:ro
      # Mount our app into apps-extra (live editing)
      - ./talk_content_browser:/var/www/html/apps-extra/talk_content_browser
    depends_on:
      - db

volumes:
  nextcloud_data:
  db_data:
